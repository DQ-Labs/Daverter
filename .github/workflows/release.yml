name: Release Builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter pyinstaller

      - name: Download FFmpeg (Windows)
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_extracted"
          New-Item -ItemType Directory -Force -Path "bin"
          Move-Item -Path "ffmpeg_extracted\*\bin\ffmpeg.exe" -Destination "bin\ffmpeg.exe"

      - name: Build with PyInstaller (Windows)
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "Daverter-Win" --icon="app.ico" --add-data "app.ico;." --add-data "bin/ffmpeg.exe;bin" --clean main.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: dist/Daverter-Win.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System UI Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter pyinstaller

      - name: Build with PyInstaller (Linux)
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "Daverter-Linux" --icon="app.ico" --add-data "app.ico:." --clean main.py

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-executable
          path: dist/Daverter-Linux

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-executable

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-executable

      - name: Make Linux binary executable
        run: chmod +x Daverter-Linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Daverter-Win.exe
            Daverter-Linux
          generate_release_notes: true
