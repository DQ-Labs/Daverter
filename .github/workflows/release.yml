name: Release Builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter tkinterdnd2 pyinstaller

      - name: Download FFmpeg (Windows)
        run: |
          # Track the 8.1 release branch (currently FFmpeg 8.1.2) rather than the
          # unstable master nightly. The verify step below fails the build if the
          # bundled binary is older than 8.1.2, so we never ship a vulnerable copy.
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-win64-gpl-8.1.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_extracted"
          New-Item -ItemType Directory -Force -Path "bin"
          Move-Item -Path "ffmpeg_extracted\*\bin\ffmpeg.exe" -Destination "bin\ffmpeg.exe"

      - name: Verify FFmpeg version (>= 8.1.2)
        run: |
          $versionLine = (& "bin\ffmpeg.exe" -version | Select-Object -First 1)
          Write-Host $versionLine
          if ($versionLine -notmatch '\d+\.\d+(\.\d+)?') {
            Write-Error "Could not parse FFmpeg version from: $versionLine"
            exit 1
          }
          $parts = $Matches[0].Split('.')
          while ($parts.Count -lt 3) { $parts += '0' }
          $version = [version]($parts -join '.')
          $minimum = [version]'8.1.2'
          if ($version -lt $minimum) {
            Write-Error "Bundled FFmpeg $version is older than required $minimum (security fix)."
            exit 1
          }
          Write-Host "OK: bundled FFmpeg $version satisfies minimum $minimum"

      - name: Build with PyInstaller (Windows)
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "Daverter-Win" --icon="app.ico" --add-data "app.ico;." --add-data "bin/ffmpeg.exe;bin" --collect-all tkinterdnd2 --clean main.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-executable
          path: dist/Daverter-Win.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install System UI Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter tkinterdnd2 pyinstaller

      - name: Build with PyInstaller (Linux)
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "Daverter-Linux" --icon="app.ico" --add-data "app.ico:." --collect-all tkinterdnd2 --clean main.py

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-executable
          path: dist/Daverter-Linux

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-executable

      - name: Download Linux Artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-executable

      - name: Make Linux binary executable
        run: chmod +x Daverter-Linux

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            Daverter-Win.exe
            Daverter-Linux
          generate_release_notes: true
